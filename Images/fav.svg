<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e4035;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5846;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6fcf97;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.98" />
      <stop offset="100%" style="stop-color:#e8f5ee;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1a3d2e" flood-opacity="0.3"/>
    </filter>
    <clipPath id="roundedRect">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- App icon rounded rect background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle texture dots -->
  <circle cx="60" cy="60" r="3" fill="#ffffff" opacity="0.05"/>
  <circle cx="452" cy="80" r="4" fill="#ffffff" opacity="0.04"/>
  <circle cx="80" cy="440" r="5" fill="#ffffff" opacity="0.04"/>
  <circle cx="440" cy="420" r="3" fill="#ffffff" opacity="0.05"/>
  <circle cx="256" cy="30" r="2.5" fill="#ffffff" opacity="0.06"/>

  <!-- Plate circle -->
  <circle cx="256" cy="272" r="168" fill="url(#plateGrad)" filter="url(#shadow)"/>
  <!-- Plate rim -->
  <circle cx="256" cy="272" r="168" fill="none" stroke="#c8e6d4" stroke-width="3"/>
  <!-- Inner plate detail ring -->
  <circle cx="256" cy="272" r="148" fill="none" stroke="#dff0e8" stroke-width="1.5"/>

  <!-- Fork (left) -->
  <g transform="translate(148, 130)" filter="url(#softShadow)">
    <!-- Handle -->
    <rect x="17" y="100" width="10" height="100" rx="5" fill="#2a5846"/>
    <!-- Neck -->
    <rect x="18.5" y="75" width="7" height="30" rx="3.5" fill="#2a5846"/>
    <!-- Tines base -->
    <rect x="12" y="20" width="20" height="60" rx="4" fill="#2a5846"/>
    <!-- Tine gaps -->
    <rect x="18" y="22" width="3" height="50" rx="1.5" fill="#1e4035"/>
    <rect x="23.5" y="22" width="3" height="50" rx="1.5" fill="#1e4035"/>
    <!-- Tine tops -->
    <rect x="12" y="10" width="5" height="18" rx="2.5" fill="#2a5846"/>
    <rect x="19" y="10" width="5" height="18" rx="2.5" fill="#2a5846"/>
    <rect x="26" y="10" width="5" height="18" rx="2.5" fill="#2a5846"/>
  </g>

  <!-- Knife (right) -->
  <g transform="translate(340, 130)" filter="url(#softShadow)">
    <!-- Handle -->
    <rect x="-17" y="100" width="10" height="100" rx="5" fill="#2a5846"/>
    <!-- Blade -->
    <path d="M-16,75 L-7,75 L-7,20 Q-7,5 -16,10 Z" fill="#3a7a5a"/>
    <!-- Blade edge highlight -->
    <path d="M-7,20 L-7,75 L-8,75 L-8,20 Q-8,6 -7,10 Z" fill="#5aad7a" opacity="0.5"/>
  </g>

  <!-- Food on plate: stylized dish -->
  <!-- Main food mound -->
  <ellipse cx="256" cy="295" rx="88" ry="52" fill="#e8a838"/>
  <!-- Food highlight -->
  <ellipse cx="238" cy="275" rx="40" ry="20" fill="#f2c060" opacity="0.6"/>
  <!-- Food shadow -->
  <ellipse cx="270" cy="320" rx="55" ry="18" fill="#c07820" opacity="0.35"/>

  <!-- Herb/garnish on top -->
  <!-- Leaf 1 -->
  <path d="M256,258 Q240,238 248,220 Q260,238 256,258Z" fill="url(#leafGrad)"/>
  <!-- Leaf 2 -->
  <path d="M256,258 Q272,238 264,220 Q252,238 256,258Z" fill="url(#leafGrad)" opacity="0.85"/>
  <!-- Stem -->
  <line x1="256" y1="258" x2="256" y2="228" stroke="#1e8449" stroke-width="1.8"/>

  <!-- Steam wisps -->
  <path d="M220,240 Q213,220 220,200 Q227,220 220,240" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.22"/>
  <path d="M256,232 Q249,212 256,192 Q263,212 256,232" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.18"/>
  <path d="M292,240 Q285,220 292,200 Q299,220 292,240" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.22"/>

  <!-- "M" lettermark in plate bottom -->
  <text x="256" y="365" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#2a5846" text-anchor="middle" opacity="0.18" letter-spacing="2">MacFood</text>

  <!-- Top "M" badge -->
  <circle cx="256" cy="108" r="44" fill="#2a5846" opacity="0.0"/>
  <!-- Brand initial ring -->
  <circle cx="256" cy="104" r="0" fill="#f0a500"/>

  <!-- Accent dots bottom corners -->
  <circle cx="130" cy="430" r="8" fill="#6fcf97" opacity="0.3"/>
  <circle cx="382" cy="430" r="8" fill="#6fcf97" opacity="0.3"/>
</svg>
